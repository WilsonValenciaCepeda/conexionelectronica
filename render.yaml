services:
  - type: web
    name: tienda-conexion-electronica
    runtime: image
    repo: https://github.com/TU_USUARIO/TU_REPOSITORIO
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://tienda-conexion-electronica.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: tienda-db
          property: connectionString
